name = "repairletter-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ── R2 Bucket ────────────────────────────────────────────────
[[r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "repairletter-evidence"

# ── Cron Triggers ────────────────────────────────────────────
[triggers]
crons = ["0 8 * * *"]

# ── Environment Variables (non-secret) ───────────────────────
[vars]
ENVIRONMENT = "production"
CLERK_JWKS_URL = "https://shining-bass-50.clerk.accounts.dev/.well-known/jwks.json"

# ── Secrets (set via Cloudflare dashboard or GitHub Actions) ─
# CLERK_SECRET_KEY
# CLERK_PUBLISHABLE_KEY
# DATABASE_URL
# DB_ENCRYPTION_KEY
# ANTHROPIC_API_KEY
# SPEECHMATICS_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# UPSTASH_REDIS_URL
# UPSTASH_REDIS_TOKEN
# CF_AI_TOKEN
# VAPID_PUBLIC_KEY
# VAPID_PRIVATE_KEY

# ── Dev environment ──────────────────────────────────────────
[env.dev]
name = "repairletter-api-dev"

[env.dev.vars]
ENVIRONMENT = "development"
CLERK_JWKS_URL = "https://shining-bass-50.clerk.accounts.dev/.well-known/jwks.json"
